<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospitals | LifeLink</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="/">Life<span>Link</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/blood_donors" class="active">Hospitals</a></li>
            <li><a href="/dashboard" id="dashboard-link">Dashboard</a></li>
            <li><a href="/about_us">About Us</a></li>
        </ul>
        <div class="auth-buttons">
            <a href="/login" class="btn" id="login-btn">Login / Register</a>
            <div id="user-profile">
                <span id="user-name"></span>
                <a href="/logout" class="btn btn-secondary btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="page-header">
            <h1>Hospitals</h1>
            <p>Browse approved hospitals with contact details and location information.</p>
            <div class="search-container">
                <input type="text" id="districtSearch" class="search-bar" placeholder="Search by hospital name or city...">
            </div>
        </section>

        <section class="donors-container">
            <h2 style="color: var(--primary-color); margin-bottom: 20px;">Approved Hospitals</h2>
            <div id="blood-donors-list" class="donor-grid">
                <p style="color: white; grid-column: 1/-1; text-align: center;">Loading hospitals...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 LifeLink Blood Donation Platform. All rights reserved.</p>
    </footer>

    <script src="/js/main.js"></script>
</body>
</html>
