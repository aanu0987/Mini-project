<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LifeLink</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <a href="/">Life<span>Link</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/blood_donors">Blood Donors</a></li>
            <li><a href="/dashboard" id="dashboard-link" class="active">Dashboard</a></li>
            <li><a href="/about_us">About Us</a></li>
        </ul>
        <div class="auth-buttons">
            <a href="/login" class="btn" id="login-btn">Login / Register</a>
            <div id="user-profile">
                <span id="user-name"></span>
                <a href="/logout" class="btn btn-secondary btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="dashboard-container" id="dashboard-container">
            <!-- Content will be loaded dynamically based on user role -->
            <div class="text-center" style="padding: 4rem;">
                <div class="spinner"></div>
                <p style="color: #8b949e; margin-top: 1rem;">Loading dashboard...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 LifeLink Organ Donation Platform. All rights reserved.</p>
    </footer>

    <!-- Add User Modal -->
    <div class="modal" id="addUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New User</h3>
                <span class="close" onclick="closeModal('addUserModal')">&times;</span>
            </div>
            <div class="modal-body">
                <form id="addUserForm">
                    <div class="form-group">
                        <label>User Type</label>
                        <select class="form-control" name="user_type" required>
                            <option value="donor">Donor</option>
                            <option value="hospital">Hospital</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" name="fullname" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" class="form-control" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" class="form-control" name="city" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-block">Add User</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Blood Request Modal -->
    <div class="modal" id="bloodRequestModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Request Blood</h3>
                <span class="close" onclick="closeModal('bloodRequestModal')">&times;</span>
            </div>
            <div class="modal-body">
                <form id="bloodRequestForm">
                    <div class="form-group">
                        <label>Blood Group</label>
                        <select class="form-control" name="blood_group" required>
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity (units)</label>
                        <input type="number" class="form-control" name="quantity" min="1" max="10" required>
                    </div>
                    <div class="form-group">
                        <label>Urgency Level</label>
                        <select class="form-control" name="urgency">
                            <option value="normal">Normal</option>
                            <option value="urgent">Urgent</option>
                            <option value="emergency">Emergency</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Patient Name (if known)</label>
                        <input type="text" class="form-control" name="patient_name">
                    </div>
                    <div class="form-group">
                        <label>Additional Notes</label>
                        <textarea class="form-control" name="notes" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-block">Submit Request</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userStr = localStorage.getItem('user');
            const role = localStorage.getItem('role');
            
            if (!userStr) {
                alert('Please login to access Blood Donors and Dashboard.');
                window.location.href = '/login';
                return;
            }
            
            const user = JSON.parse(userStr);
            const dashboardLink = document.getElementById('dashboard-link');
            if (dashboardLink) {
                dashboardLink.textContent = role === 'hospital' ? 'Hospital Dashboard' : 'Dashboard';
            }
            
            // Load appropriate dashboard
            if (role === 'admin') {
                window.location.href = '/admin';
                return;
            } else if (role === 'hospital') {
                loadHospitalDashboard(user);
            } else {
                loadDonorDashboard(user);
            }
        });
        
        async function loadHospitalDashboard(user) {
            const container = document.getElementById('dashboard-container');
            const token = localStorage.getItem('token') || '';
            const organOptions = ['Heart', 'Lungs', 'Liver', 'Kidneys', 'Pancreas', 'Intestines', 'Cornea', 'Skin', 'Bone Marrow', 'Bone', 'Heart Valves', 'Blood Vessels'];
            const bloodGroups = ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'];
            const tamilNaduDistricts = ['Ariyalur', 'Chengalpattu', 'Chennai', 'Coimbatore', 'Cuddalore', 'Dharmapuri', 'Dindigul', 'Erode', 'Kallakurichi', 'Kancheepuram', 'Kanyakumari', 'Karur', 'Krishnagiri', 'Madurai', 'Mayiladuthurai', 'Nagapattinam', 'Namakkal', 'Nilgiris', 'Perambalur', 'Pudukkottai', 'Ramanathapuram', 'Ranipet', 'Salem', 'Sivaganga', 'Tenkasi', 'Thanjavur', 'Theni', 'Thoothukudi', 'Tiruchirappalli', 'Tirunelveli', 'Tirupathur', 'Tiruppur', 'Tiruvallur', 'Tiruvannamalai', 'Tiruvarur', 'Vellore', 'Viluppuram', 'Virudhunagar'];

            try {
                const response = await fetch('/hospital/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();

                if (!response.ok) {
                    container.innerHTML = `<div class="alert alert-danger" style="text-align: center;">${data.error || 'Unable to load hospital dashboard.'}</div>`;
                    return;
                }

                const hospital = data.hospital || user || {};
                const pendingRequests = data.pending_requests || [];
                const notifications = data.notifications || [];
                const otherHospitalMessages = data.other_hospital_messages || [];
                const nearbyDonors = data.nearby_donors || [];
                const recentRequests = pendingRequests.slice(0, 10);
                const recentNotifications = notifications.slice(0, 8);

                container.innerHTML = `
                    <div class="dashboard-header" style="background: linear-gradient(135deg, #27ae60, #229954);">
                        <h1>${hospital.hospital_name || hospital.fullname || 'Hospital Dashboard'}</h1>
                        <p>Welcome back, ${hospital.fullname || 'Hospital Partner'}. Manage requests and track donor availability.</p>
                        <p>
                            Login ID: ${hospital.login_id || 'Not assigned'}
                            <span class="badge ${hospital.status === 'approved' ? 'badge-success' : 'badge-warning'}" style="margin-left: 8px;">
                                ${(hospital.status || 'pending').toUpperCase()}
                            </span>
                        </p>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card dashboard-stat hospital">
                            <div class="stat-value">${nearbyDonors.length}</div>
                            <div class="stat-label">Nearby Donors</div>
                        </div>
                        <div class="stat-card dashboard-stat blood">
                            <div class="stat-value">${pendingRequests.length}</div>
                            <div class="stat-label">Pending Requests</div>
                        </div>
                        <div class="stat-card dashboard-stat organ">
                            <div class="stat-value">${recentNotifications.filter(n => n.type === 'received').length}</div>
                            <div class="stat-label">Completed Updates</div>
                        </div>
                        <div class="stat-card dashboard-stat">
                            <div class="stat-value">${recentNotifications.length}</div>
                            <div class="stat-label">Recent Alerts</div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Hospital Profile</h3>
                            </div>
                            <div class="card-body">
                                <p><b>Name:</b> ${hospital.hospital_name || hospital.fullname || 'N/A'}</p>
                                <p><b>Email:</b> ${hospital.email || 'N/A'}</p>
                                <p><b>Phone:</b> ${hospital.phone || 'N/A'}</p>
                                <p><b>City:</b> ${hospital.city || 'N/A'}</p>
                                <p><b>Address:</b> ${hospital.address || 'N/A'}</p>
                                <p><b>License Number:</b> ${hospital.license_number || 'N/A'}</p>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Other Hospitals Requests and Received Messages</h3>
                                <span class="badge badge-success">${otherHospitalMessages.length}</span>
                            </div>
                            <div class="card-body" style="max-height: 280px; overflow-y: auto;">
                                ${otherHospitalMessages.length === 0 ? '<p class="text-muted">No request/received messages from other hospitals yet.</p>' : otherHospitalMessages.map(msg => `
                                    <div class="glass-panel" style="padding: 10px; margin-bottom: 8px;">
                                        <b>${(msg.type || 'message').toUpperCase()}</b> - ${msg.hospital_name || 'Hospital'}<br>
                                        ${msg.request_type ? `Type: ${(msg.request_type || '').toUpperCase()}<br>` : ''}
                                        ${msg.message || 'No message available.'}<br>
                                        <small>${msg.created_at ? new Date(msg.created_at).toLocaleString() : ''}</small>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Organ and Blood Request</h3>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="card" style="margin-bottom: 0;">
                                    <div class="card-header"><h3 class="card-title">Organ Request</h3></div>
                                    <div class="card-body">
                                        <div class="form-group">
                                            <label for="hospital-organ-select">Choose the Organ</label>
                                            <select id="hospital-organ-select" class="form-control">
                                                <option value="">Select organ</option>
                                                ${organOptions.map(organ => `<option value="${organ}">${organ}</option>`).join('')}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label for="hospital-organ-blood-group">Blood Group</label>
                                            <select id="hospital-organ-blood-group" class="form-control">
                                                <option value="">Select blood group</option>
                                                ${bloodGroups.map(group => `<option value="${group}">${group}</option>`).join('')}
                                            </select>
                                        </div>
                                        <button id="hospital-organ-request-btn" class="btn">Request</button>
                                    </div>
                                </div>
                                <div class="card" style="margin-bottom: 0;">
                                    <div class="card-header"><h3 class="card-title">Blood Request</h3></div>
                                    <div class="card-body">
                                        <div class="form-group">
                                            <label for="hospital-blood-group-select">Choose the Blood</label>
                                            <select id="hospital-blood-group-select" class="form-control">
                                                <option value="">Select blood group</option>
                                                ${bloodGroups.map(group => `<option value="${group}">${group}</option>`).join('')}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label for="hospital-city-select">City</label>
                                            <select id="hospital-city-select" class="form-control">
                                                <option value="">Select district</option>
                                                ${tamilNaduDistricts.map(district => `<option value="${district}">${district}</option>`).join('')}
                                            </select>
                                        </div>
                                        <button id="hospital-blood-request-btn" class="btn">Request</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Pending Donation Requests</h3>
                            <span class="badge badge-danger">${pendingRequests.length}</span>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>Type</th>
                                            <th>Organ</th>
                                            <th>Blood Group</th>
                                            <th>Received</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${recentRequests.map(req => `
                                            <tr>
                                                <td><span class="badge ${req.request_type === 'blood' ? 'badge-danger' : 'badge-success'}">${(req.request_type || 'N/A').toUpperCase()}</span></td>
                                                <td>${req.organ || req.details || req.patient_name || 'N/A'}</td>
                                                <td>${req.blood_group || 'N/A'}</td>
                                                <td><button class="btn btn-secondary hospital-received-btn" data-request-id="${req._id}" data-request-type="${req.request_type || 'organ'}">Received</button></td>
                                            </tr>
                                        `).join('')}
                                        ${recentRequests.length === 0 ? '<tr><td colspan="4" style="text-align: center;">No pending requests.</td></tr>' : ''}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                `;

                document.getElementById('hospital-organ-request-btn')?.addEventListener('click', async () => {
                    const organ = document.getElementById('hospital-organ-select')?.value;
                    const bloodGroup = document.getElementById('hospital-organ-blood-group')?.value;
                    if (!organ || !bloodGroup) {
                        alert('Please choose an organ and blood group.');
                        return;
                    }
                    await createHospitalRequest(token, {
                        request_type: 'organ',
                        blood_group: bloodGroup,
                        details: organ,
                        organ
                    });
                });

                document.getElementById('hospital-blood-request-btn')?.addEventListener('click', async () => {
                    const bloodGroup = document.getElementById('hospital-blood-group-select')?.value;
                    const city = document.getElementById('hospital-city-select')?.value;
                    if (!bloodGroup || !city) {
                        alert('Please choose blood group and city.');
                        return;
                    }
                    await createHospitalRequest(token, {
                        request_type: 'blood',
                        blood_group: bloodGroup,
                        details: `City: ${city}`
                    });
                });

                container.querySelectorAll('.hospital-received-btn').forEach((button) => {
                    button.addEventListener('click', async () => {
                        const requestId = button.getAttribute('data-request-id');
                        const requestType = button.getAttribute('data-request-type') || 'organ';
                        await markRequestReceived(token, requestId, requestType);
                    });
                });
            } catch (error) {
                console.error('Error loading hospital dashboard:', error);
                container.innerHTML = '<div class="alert alert-danger" style="text-align: center;">Error loading hospital dashboard. Please refresh.</div>';
            }
        }

        async function createHospitalRequest(token, payload) {
            const response = await fetch('/hospital/request', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            alert(data.message || data.error || 'Request submitted.');
            if (response.ok) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                loadHospitalDashboard(user);
            }
        }

        async function markRequestReceived(token, requestId, requestType) {
            const response = await fetch('/hospital/received', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ request_id: requestId, request_type: requestType })
            });
            const data = await response.json();
            alert(data.message || data.error || 'Request updated.');
            if (response.ok) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                loadHospitalDashboard(user);
            }
        }

        async function loadDonorDashboard(user, profileMessage = '') {
            const container = document.getElementById('dashboard-container');
            
            try {
                const response = await fetch('/donor/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token') || ''}`
                    }
                });
                const data = await response.json();

                if (!response.ok) {
                    container.innerHTML = `<div class="alert alert-danger" style="text-align: center;">${data.error || 'Unauthorized'}</div>`;
                    return;
                }

                const donor = data.donor || user;
                const notifications = data.hospital_notifications || [];
                const formatDisplayDate = (dateValue) => {
                    if (!dateValue) return 'No record available';
                    const parsedDate = new Date(dateValue);
                    return Number.isNaN(parsedDate.getTime()) ? dateValue : parsedDate.toLocaleDateString();
                };
                const getInputDateValue = (dateValue) => {
                    if (!dateValue) return '';
                    const parsedDate = new Date(dateValue);
                    if (Number.isNaN(parsedDate.getTime())) return dateValue;
                    return parsedDate.toISOString().split('T')[0];
                };
                const profileAddress = donor.address || 'N/A';

                container.innerHTML = `
                    <div class="dashboard-header">
                        <h1>Blood Donor Dashboard</h1>
                        <p>Welcome back, ${donor.fullname || 'Donor'}. Track your donations and stay ready to save lives.</p>
                    </div>
                    ${profileMessage ? `<div class="alert alert-success">${profileMessage}</div>` : ''}
                    
                    <div class="stats-grid">
                        <div class="stat-card dashboard-stat blood">
                            <div class="stat-value">${data.total_donations || 0}</div>
                            <div class="stat-label">Total Donations</div>
                        </div>
                        <div class="stat-card dashboard-stat">
                            <div class="stat-value">${data.age || '-'}</div>
                            <div class="stat-label">Age</div>
                        </div>
                        <div class="stat-card dashboard-stat">
                            <div class="stat-value">${donor.weight || '-'}</div>
                            <div class="stat-label">Weight (kg)</div>
                        </div>
                        <div class="stat-card dashboard-stat">
                            <div class="stat-value">${donor.blood_group || 'N/A'}</div>
                            <div class="stat-label">Blood Group</div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Last Donation</h3>
                            </div>
                            <div class="card-body">
                                <div class="text-center p-3">
                                    <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Last Donation Date</p>
                                    <p style="font-size: 1.5rem; color: var(--primary-color);">${formatDisplayDate(data.last_donation_date)}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Your Profile</h3>
                            </div>
                            <div class="card-body">
                                <div style="display: grid; gap: 1rem;">
                                    <p><strong>Name:</strong> ${donor.fullname || 'N/A'}</p>
                                    <p><strong>Email:</strong> ${donor.email || 'N/A'}</p>
                                    <p><strong>Phone:</strong> ${donor.phone || 'N/A'}</p>
                                    <p><strong>Address:</strong> ${profileAddress}</p>
                                    <p><strong>City:</strong> ${donor.city || 'N/A'}</p>
                                    <p><strong>Status:</strong> <span class="badge badge-success">Active Donor</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Hospital Notifications</h3>
                        </div>
                        <div class="card-body">
                            ${notifications.length === 0 ? '<p class="text-muted">No hospital notifications yet.</p>' : notifications.map(n => `
                                <div class="glass-panel" style="padding:12px; margin:8px 0;">
                                    <b>${(n.type || 'Notification').toUpperCase()}</b><br>
                                    ${n.message || ''}<br>
                                    <small>${n.created_at ? new Date(n.created_at).toLocaleString() : ''}</small>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Update Profile</h3>
                        </div>
                        <div class="card-body">
                            <div id="donor-profile-alert"></div>
                            <form id="donorProfileForm">
                                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem;">
                                    <div class="form-group">
                                        <label for="donor-phone">Phone Number</label>
                                        <input id="donor-phone" type="tel" name="phone" class="form-control" value="${donor.phone || ''}" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="donor-last-donation">Last Donation Date</label>
                                        <input id="donor-last-donation" type="date" name="last_donation_date" class="form-control" value="${getInputDateValue(data.last_donation_date)}">
                                    </div>
                                    <div class="form-group">
                                        <label for="donor-weight">Weight (kg)</label>
                                        <input id="donor-weight" type="number" min="45" step="0.1" name="weight" class="form-control" value="${donor.weight || ''}" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="donor-city">City</label>
                                        <input id="donor-city" type="text" name="city" class="form-control" value="${donor.city || ''}" required>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="donor-address">Address</label>
                                    <textarea id="donor-address" name="address" class="form-control" rows="3" placeholder="Enter your address" required>${donor.address || ''}</textarea>
                                </div>
                                <button type="submit" class="btn">Save Profile Updates</button>
                            </form>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading donor dashboard:', error);
                container.innerHTML = '<div class="alert alert-danger" style="text-align: center;">Error loading dashboard. Please refresh.</div>';
            }
        }
        
        // Helper Functions
        function setupUserSearch() {
            const searchInput = document.getElementById('userSearch');
            const typeFilter = document.getElementById('userTypeFilter');
            
            if (searchInput) {
                searchInput.addEventListener('keyup', filterUsers);
            }
            if (typeFilter) {
                typeFilter.addEventListener('change', filterUsers);
            }
        }
        
        function filterUsers() {
            const searchTerm = document.getElementById('userSearch')?.value.toLowerCase() || '';
            const typeFilter = document.getElementById('userTypeFilter')?.value || 'all';
            const rows = document.querySelectorAll('#usersTable tbody tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                const userType = row.dataset.userType;
                
                const typeMatch = typeFilter === 'all' || userType === typeFilter;
                const searchMatch = searchTerm === '' || text.includes(searchTerm);
                
                row.style.display = typeMatch && searchMatch ? '' : 'none';
            });
        }
        
        function setupDonorSearch() {
            const searchInput = document.getElementById('donorSearch');
            if (searchInput) {
                searchInput.addEventListener('keyup', function() {
                    const searchTerm = this.value.toLowerCase();
                    const rows = document.querySelectorAll('#donorTable tbody tr');
                    
                    rows.forEach(row => {
                        const text = row.textContent.toLowerCase();
                        row.style.display = text.includes(searchTerm) ? '' : 'none';
                    });
                });
            }
        }
        
        // Modal Functions
        function openBloodRequestModal() {
            document.getElementById('bloodRequestModal').classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // API Functions
        async function viewUser(userId) {
            alert(`View user ${userId}`);
        }
        
        async function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    const response = await fetch(`http://localhost:5000/api/delete-user/${userId}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        alert('User deleted successfully');
                        location.reload();
                    } else {
                        alert('Error deleting user');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error deleting user');
                }
            }
        }
        
        async function verifyHospital(hospitalId) {
            if (confirm('Verify this hospital?')) {
                try {
                    const response = await fetch(`http://localhost:5000/api/verify-hospital/${hospitalId}`, {
                        method: 'POST'
                    });
                    
                    if (response.ok) {
                        alert('Hospital verified successfully');
                        location.reload();
                    } else {
                        alert('Error verifying hospital');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error verifying hospital');
                }
            }
        }
        
        async function approveRequest(requestId) {
            if (confirm('Approve this request?')) {
                try {
                    const response = await fetch('http://localhost:5000/api/approve-request', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({request_id: requestId})
                    });
                    
                    if (response.ok) {
                        alert('Request approved');
                        location.reload();
                    } else {
                        alert('Error approving request');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error approving request');
                }
            }
        }
        
        function rejectRequest(requestId) {
            alert('Reject request: ' + requestId);
        }
        
        function contactDonor(donorId, phone) {
            window.location.href = `tel:${phone}`;
        }
        
        function updateAvailability() {
            alert('Update availability feature coming soon!');
        }
        
        function viewDonationHistory() {
            alert('View donation history feature coming soon!');
        }
        
        function editProfile() {
            alert('Edit profile feature coming soon!');
        }
        
        // Form Submissions
        document.addEventListener('submit', async (e) => {
            if (e.target.id === 'addUserForm') {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);
                data.role = data.user_type;
                
                try {
                    const response = await fetch('http://localhost:5000/register', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        alert('User added successfully');
                        closeModal('addUserModal');
                        location.reload();
                    } else {
                        const error = await response.json();
                        alert('Error: ' + error.error);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error adding user');
                }
            }
            
            if (e.target.id === 'bloodRequestForm') {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);
                
                try {
                    const response = await fetch('http://localhost:5000/api/request-blood', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        alert('Blood request submitted successfully');
                        closeModal('bloodRequestModal');
                        location.reload();
                    } else {
                        alert('Error submitting request');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error submitting request');
                }
            }

            if (e.target.id === 'donorProfileForm') {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);
                const alertContainer = document.getElementById('donor-profile-alert');
                const submitButton = e.target.querySelector('button[type="submit"]');

                data.weight = data.weight ? Number(data.weight) : '';
                if (!data.last_donation_date) {
                    delete data.last_donation_date;
                }

                if (alertContainer) {
                    alertContainer.innerHTML = '';
                }

                if (submitButton) {
                    submitButton.disabled = true;
                    submitButton.textContent = 'Saving...';
                }

                try {
                    const response = await fetch('http://localhost:5000/donor/profile', {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token') || ''}`
                        },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error || 'Unable to update profile');
                    }

                    const updatedUser = {
                        ...JSON.parse(localStorage.getItem('user') || '{}'),
                        ...result.donor
                    };
                    localStorage.setItem('user', JSON.stringify(updatedUser));

                    await loadDonorDashboard(updatedUser, result.message || 'Profile updated successfully.');
                } catch (error) {
                    console.error('Error updating donor profile:', error);
                    if (alertContainer) {
                        alertContainer.innerHTML = `<div class="alert alert-danger">${error.message || 'Error updating profile'}</div>`;
                    }
                } finally {
                    if (submitButton) {
                        submitButton.disabled = false;
                        submitButton.textContent = 'Save Profile Updates';
                    }
                }
            }
        });
        
        // Click outside modal to close
        window.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        });
    </script>
