<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | LifeLink</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="color:white; text-decoration:none;">Life<span>Link</span></a>
        </div>
        <a href="index.html" class="btn btn-secondary">Back to Home</a>
    </nav>

    <div class="auth-container">
        <div class="glass-panel auth-box">
            <h2 style="text-align:center">Create Account</h2>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-role="donor">Blood Donor</button>
                <button class="tab-btn" data-role="hospital">Hospital</button>
            </div>

            <form id="registerForm">
                <input type="hidden" id="user-role" name="role" value="donor">

                <!-- Common Fields for Both -->
                <div id="common-fields">
                    <div class="form-group">
                        <label id="name-label">Full Name</label>
                        <input type="text" id="fullname" name="fullname" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="phone" name="phone" required placeholder="9876543210">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" name="email" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="city" name="city" required placeholder="e.g. Chennai, Salem">
                    </div>
                </div>

                <!-- Donor Specific Fields -->
                <div id="donor-fields">
                    <div class="form-group">
                        <label>Aadhar Number</label>
                        <input type="text" id="aadhar" name="aadhar" maxlength="12" placeholder="1234 5678 9012">
                    </div>
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" id="weight" name="weight" placeholder="e.g. 65">
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dob" name="dob">
                    </div>
                    <div class="form-group">
                        <label>Blood Group</label>
                        <select id="blood_group" name="blood_group" class="form-control">
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Last Donation Date (optional)</label>
                        <input type="date" id="last_donation_date" name="last_donation_date">
                    </div>
                </div>

                <!-- Hospital Specific Fields -->
                <div id="hospital-fields" style="display:none;">
                    <div class="form-group">
                        <label>Hospital Name</label>
                        <input type="text" id="hospital-name" name="hospital_name" placeholder="City General Hospital">
                    </div>
                    <div class="form-group">
                        <label>License Number</label>
                        <input type="text" id="license_number" name="license_number" placeholder="License #">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="address" name="address" placeholder="Hospital address">
                    </div>
                    <div class="form-group">
                        <label>Contact Person</label>
                        <input type="text" id="contact_person" name="contact_person" placeholder="Contact person name">
                    </div>
                </div>

                <button type="submit" class="btn" style="width:100%; margin-top:20px;">Register (Pending Admin Verification)</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        // Tab switching functionality
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Update active tab
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // Get selected role
                const role = this.dataset.role;
                document.getElementById('user-role').value = role;
                
                // Update form fields based on role
                if (role === 'donor') {
                    document.getElementById('name-label').textContent = 'Full Name';
                    document.getElementById('donor-fields').style.display = 'block';
                    document.getElementById('hospital-fields').style.display = 'none';
                    
                    // Make donor fields required
                    document.getElementById('aadhar').required = true;
                    document.getElementById('weight').required = true;
                    document.getElementById('dob').required = true;
                    document.getElementById('blood_group').required = true;
                    
                    // Make hospital fields not required
                    document.getElementById('hospital-name').required = false;
                    document.getElementById('license_number').required = false;
                    document.getElementById('address').required = false;
                    document.getElementById('contact_person').required = false;
                } else {
                    document.getElementById('name-label').textContent = 'Hospital Name';
                    document.getElementById('donor-fields').style.display = 'none';
                    document.getElementById('hospital-fields').style.display = 'block';
                    
                    // Make donor fields not required
                    document.getElementById('aadhar').required = false;
                    document.getElementById('weight').required = false;
                    document.getElementById('dob').required = false;
                    document.getElementById('blood_group').required = false;
                    
                    // Make hospital fields required
                    document.getElementById('hospital-name').required = true;
                    document.getElementById('license_number').required = true;
                    document.getElementById('address').required = true;
                    document.getElementById('contact_person').required = true;
                }
            });
        });

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const role = document.getElementById('user-role').value;
            
            // Prepare base data
            const formData = {
                fullname: role === 'donor' ? document.getElementById('fullname').value : document.getElementById('hospital-name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                city: document.getElementById('city').value,
                role: role
            };

            // Add role-specific data
            if (role === 'donor') {
                formData.aadhar = document.getElementById('aadhar').value;
                formData.weight = document.getElementById('weight').value;
                formData.dob = document.getElementById('dob').value;
                formData.blood_group = document.getElementById('blood_group').value;
                formData.last_donation_date = document.getElementById('last_donation_date').value || null;
            } else {
                formData.license_number = document.getElementById('license_number').value;
                formData.address = document.getElementById('address').value;
                formData.contact_person = document.getElementById('contact_person').value;
            }

            try {
                const response = await fetch('http://localhost:5000/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert('Registration successful! Please wait for admin verification.');
                    window.location.href = 'login.html';
                } else {
                    alert('Registration failed: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during registration. Please try again.');
            }
        });
    </script>
</body>
</html>
