<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | LifeLink</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo"><a href="index.html" style="color:white; text-decoration:none;">Life<span>Link</span></a></div>
    <a href="index.html" class="btn btn-secondary">Back to Home</a>
</nav>
<div class="auth-container">
    <div class="glass-panel auth-box">
        <h2 style="text-align:center">Create Account</h2>
        <div class="auth-tabs">
            <button class="tab-btn active" data-role="donor">Blood Donor</button>
            <button class="tab-btn" data-role="hospital">Hospital</button>
        </div>
        <form id="registerForm">
            <input type="hidden" id="user-role" value="donor">
            <div id="common-fields">
                <div class="form-group"><label>Full Name / Hospital Name</label><input type="text" id="fullname" required></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="phone" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
            </div>
            <div id="donor-fields">
                <div class="form-group"><label>Aadhar Number</label><input type="text" id="aadhar" maxlength="12"></div>
                <div class="form-group"><label>Weight (kg)</label><input type="number" id="weight"></div>
                <div class="form-group"><label>Date of Birth</label><input type="date" id="dob"></div>
                <div class="form-group"><label>Blood Group</label><input type="text" id="blood_group" placeholder="A+ / O-"></div>
                <div class="form-group"><label>Last Donation Date (optional)</label><input type="date" id="last_donation_date"></div>
            </div>
            <div id="hospital-fields" style="display:none;">
                <div class="form-group"><label>Address</label><input type="text" id="address"></div>
                <div class="form-group"><label>Contact Person</label><input type="text" id="contact_person"></div>
            </div>
            <button class="btn" type="submit" style="width:100%">Register (Pending Admin Verification)</button>
        </form>
        <div class="auth-footer">Already have an account? <a href="login.html">Login</a></div>
    </div>
</div>
<script src="/js/main.js"></script>
</body>
</html>
