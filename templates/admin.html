<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | LifeLink</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Life<span>Link</span> Admin</div>
        <div class="auth-buttons">
            <button id="logout-btn" class="btn btn-secondary">Logout</button>
        </div>
    </nav>
    
    <main>
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>Admin Dashboard</h1>
                <p>Manage verifications and review all registered users.</p>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Pending Verification Requests</h3>
                    <span class="badge badge-danger" id="pending-count">0</span>
                </div>
                <div class="card-body">
                    <div id="pending-users"></div>
                </div>
            </div>
            
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 LifeLink Organ Donation Platform. All rights reserved.</p>
    </footer>
    
    <script src="/js/main.js"></script>
</body>
</html>
