<!DOCTYPE html>
<html>
  <head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <nav class="navbar"><div class="logo">Life<span>Link</span>Admin</div>
      <button id="logout-btn" class="btn btn-secondary">Logout</button>

    <main class="page-header">
      <h1>Admin Dashboard</h1>
      <p>Manage verifications, review all registered users, and monitor system notifications.</p>
      <section class="glass-panel" style="padding:20px; margin:20px 0;">
        <h2>Pending Verification Requests</h2>
        <div id="pending-users"></div>
      </section>
      <section class="glass-panel" style="padding:20px; margin:20px 0;">
        <h2>All Users</h2>
        <div id="all-users"></div>
      </section>
      <section class="glass-panel" style="padding:20px; margin:20px 0;">
        <h2>System Notifications</h2>
        <div id="admin-notifications"></div>
      </section>
    </main>
    <script src="/js/main.js"></script>
  </body>
</html>
